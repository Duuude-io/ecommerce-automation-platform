<!DOCTYPE html>
<html>

<head>
  <title>Profile</title>

  <meta name="viewport" content="width=device-width, initial-scale=0.8">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

  <!-- Shared CSS -->
  <link rel="stylesheet" href="../styles/shared/general.css">
  <link rel="stylesheet" href="../styles/shared/dydx-header.css">

  <!-- Signin Page CSS -->
  <link rel="stylesheet" href="../styles/pages/login.css">
  <link rel="stylesheet" href="../styles/pages/account.css">
</head>

<body class="account-page">
  <div class="signin-page-wrapper">

    <header class="signin-header">
      <a href="../index.html">
        <img class="dydx-logo-dark" src="../images/DyDx_Logo_(2).gif">
      </a>
    </header>

    <main class="auth-container">

      <div class="auth-card">

        <h1 class="account-title">Profile</h1>

        <div class="profile-info">

          <div class="profile-row">
            <label>Name</label>
            <p class="js-profile-name">-</p>
          </div>

          <div class="profile-row">
            <label>Email</label>
            <p class="js-profile-email">-</p>
          </div>

          <div class="profile-row">
            <label>Phone</label>
            <p class="js-profile-phone">-</p>
          </div>

          <div class="profile-row">
            <label>Status</label>
            <p class="js-profile-status">-</p>
          </div>

        </div>

        <button class="primary-button js-back-btn">
          Back to Account
        </button>
      </div>
    </main>

    <main class="auth-container">
      <div class="auth-card">

        <h1 class="account-title">Addresses</h1>

        <button class="js-add-address">
          + Add Address
        </button>

        <div class="js-address-list"></div>

        <div class="address-form js-address-form hidden">
          <input class="js-full-name" placeholder="Full Name">
          <input class="js-phone" placeholder="Phone Number">
          <input class="js-address" placeholder="Street Address">
          <input class="js-city" placeholder="City">

          <select class="js-state"></select>
          <select class="js-country"></select>

          <button type="button" class="primary-button js-save-address">
            Save Address
          </button>
        </div>

      </div>
    </main>

    <div class="divider-2"></div>

    <footer class="signin-footer">
      <div class="footer-links">
        <a href="#">Conditions of Use</a>
        <a href="#">Privacy Notice</a>
        <a href="#">Help</a>
      </div>

      <div class="footer-copyright">
        © 1996-2026, dydx.com, Inc. or its affiliates
      </div>
    </footer>

  </div>

  <script type="module" src="../scripts/profile/profile.js"></script>

</body>

</html>
