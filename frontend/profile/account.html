<!DOCTYPE html>
<html>

<head>
  <title>Profile</title>

  <meta name="viewport" content="width=device-width, initial-scale=0.8">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

  <!-- Shared CSS -->
  <link rel="stylesheet" href="../styles/shared/general.css">
  <link rel="stylesheet" href="../styles/shared/dydx-header.css">

  <!-- Signin Page CSS -->
  <link rel="stylesheet" href="../styles/pages/login.css">
  <link rel="stylesheet" href="../styles/pages/account.css">
</head>

<body class="account-page">
  <div class="signin-page-wrapper">

    <header class="signin-header">
      <a href="../index.html">
        <img class="dydx-logo-dark" src="../images/DyDx_Logo_(2).gif">
      </a>
    </header>

    <main class="auth-container">

      <div class="auth-card">

        <div class="account-title">
          <h1>Account Center</h1>
          <p class="account-subtitle js-account-greeting">
            Welcome back
          </p>
        </div>

        <div class="account-grid">

          <button class="account-card js-profile-card">
            <h3>Profile</h3>
            <p>Manage your personal information</p>
          </button>

          <button class="account-card js-orders-card">
            <h3>Orders</h3>
            <p>View your order history</p>
          </button>

          <button class="account-card js-payment-card">
            <h3>Payment Methods</h3>
            <p>Manage saved cards</p>
          </button>

          <button class="account-card js-security-card">
            <h3>Security</h3>
            <p>Manage password and account security</p>
          </button>

          <button class="account-card js-logout-card">
            <h3>Logout</h3>
            <p>Sign out of your account</p>
          </button>

        </div>

      </div>

    </main>


    <div class="divider-2"></div>

    <footer class="signin-footer">
      <div class="footer-links">
        <a href="#">Conditions of Use</a>
        <a href="#">Privacy Notice</a>
        <a href="#">Help</a>
      </div>

      <div class="footer-copyright">
        © 1996-2026, dydx.com, Inc. or its affiliates
      </div>
    </footer>

  </div>

  <script type="module" src="../scripts/profile/account.js"></script>

</body>

</html>
