<!DOCTYPE html>
<html>

<head>
  <title>Profile</title>

  <meta name="viewport" content="width=device-width, initial-scale=0.8">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

  <!-- Shared CSS -->
  <link rel="stylesheet" href="../styles/shared/general.css">
  <link rel="stylesheet" href="../styles/shared/amazon-header.css">

  <!-- Signin Page CSS -->
  <link rel="stylesheet" href="../styles/pages/login.css">
  <link rel="stylesheet" href="../styles/pages/account.css">
</head>

<body class="account-page">
  <div class="signin-page-wrapper">

    <header class="signin-header">
      <a href="../index.html">
        <img class="amazon-logo-dark" src="../images/Dwde_Logo_ .gif">
      </a>
    </header>

    <main class="auth-container">
      <div class="auth-card">

        <h1 class="account-title">
          Security Settings
        </h1>

        <p class="account-subtitle">
          Manage your password and account security.
        </p>

        <div class="account-section">
          <h3>Verified Contact Information</h3>

          <p>
            Email:
            <span class="js-email">
              -
            </span>
          </p>

          <p>
            Phone:
            <span class="js-phone">
              -
            </span>
          </p>
        </div>

        <div class="divider"></div>

        <div class="account-section">
          <h3>Change Password</h3>

          <input type="password" class="js-current-password" placeholder="Current Password">
          <input type="password" class="js-new-password" placeholder="New Password">
          <input type="password" class="js-confirm-password" placeholder="Confirm New Password">

          <label>
            <input type="radio" name="otp-method" value="email" checked>
            Email
          </label>

          <label>
            <input type="radio" name="otp-method" value="phone">
            Phone
          </label>

          <button class="primary-button js-update-password">
            Update Password
          </button>
        </div>

        <div class="active-sessions-section">
          <h1>Active Sessions</h1>

          <div class="js-active-sessions">
            Loading sessions...
          </div>

          <div class="session-card"></div>

          <button class="js-signout-others">
            Sign Out All Other Devices
          </button>
        </div>
      </div>
    </main>

    <div class="divider-2"></div>

    <footer class="signin-footer">
      <div class="footer-links">
        <a href="#">Conditions of Use</a>
        <a href="#">Privacy Notice</a>
        <a href="#">Help</a>
      </div>

      <div class="footer-copyright">
        © 1996-2026, Amazon.com, Inc. or its affiliates
      </div>
    </footer>

  </div>

  <script type="module" src="../scripts/profile/security.js"></script>

</body>

</html>
