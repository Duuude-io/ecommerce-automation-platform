<!DOCTYPE html>
<html>

<head>
  <title>Payment Methods</title>

  <meta name="viewport" content="width=device-width, initial-scale=0.8">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

  <!-- Shared CSS -->
  <link rel="stylesheet" href="../styles/shared/general.css">
  <link rel="stylesheet" href="../styles/shared/amazon-header.css">

  <!-- Signin Page CSS -->
  <link rel="stylesheet" href="../styles/pages/login.css">
  <link rel="stylesheet" href="../styles/pages/account.css">
</head>

<body class="account-page">
  <div class="signin-page-wrapper">

    <header class="signin-header">
      <a href="../index.html">
        <img class="amazon-logo-dark" src="../images/amazon-logo-black.png">
      </a>
    </header>

    <main class="auth-container">
      <div class="auth-card">

        <div class="page-header">
          <h1>Payment Methods</h1>

          <button class="js-add-payment">
            + Add Payment Method
          </button>
        </div>

        <div class="js-payment-list">

          <div class="payment-form js-payment-form hidden">

            <input type="text" class="js-card-type" placeholder="Card Type (Visa, Mastercard)">

            <input type="text" class="js-card-name" placeholder="Name on Card">

            <input type="text" class="js-last16" maxlength="16" placeholder="Card Number">

            <input type="text" class="js-expiry" placeholder="MM/YY">

            <input type="text" class="js-cvv" maxlength="4" placeholder="CVV">

            <input type="text" class="js-billing-zip" placeholder="Billing ZIP Code">

            <button class="js-save-payment">
              Save Payment Method
            </button>

          </div>

          <p class="empty-state">
            No payment methods added yet.
          </p>

        </div>
      </div>
    </main>

    <div class="divider-2"></div>

    <footer class="signin-footer">
      <div class="footer-links">
        <a href="#">Conditions of Use</a>
        <a href="#">Privacy Notice</a>
        <a href="#">Help</a>
      </div>

      <div class="footer-copyright">
        © 1996-2026, Amazon.com, Inc. or its affiliates
      </div>
    </footer>

  </div>

  <script type="module" src="../scripts/profile/paymentMethods.js"></script>

</body>

</html>
