<!DOCTYPE html>
<html>

<head>
  <title>Number verify</title>

  <meta name="viewport" content="width=device-width, initial-scale=0.8">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

  <!-- Shared CSS -->
  <link rel="stylesheet" href="styles/shared/general.css">
  <link rel="stylesheet" href="styles/shared/dydx-header.css">

  <!-- Signin Page CSS -->
  <link rel="stylesheet" href="styles/pages/login.css">
</head>

<body class="number-verify-page">

  <!-- Header -->
  <header class="signin-header">
    <img src="images/Dwde_Logo_ .gif" class="dydx-logo-dark">
  </header>

  <!-- Main -->
  <main class="auth-container">

    <div class="auth-card">

      <h4>Verify mobile number</h4>

      <div class="otp-wrapper">
        <p class="otp-number">
          <span class="js-phone-number"></span>
          <a href="#" class="js-change-user">Change</a>
        </p>

        <p class="otp-info">
          We've sent a One Time Password (OTP) to your phone number.
          Please enter it below.
        </p>

      </div>

      <form class="create-form js-phone-create-form">
        <div class="input-group">
          <label>Enter security code</label>
          <div class="create-input-wrapper">
            <input type="text" placeholder="-_-_-_-_-_-_" class="js-otp-input" maxlength="8">
          </div>
        </div>

        <button type="submit" class="primary-button js-otp-phone-submit">
          Verify your account
        </button>

      </form>

      <p class="create-signin-info">
        By creating an account, you agree to dydx's
        <a href="#">Conditions of Use</a> and
        <a href="#">Privacy Notice</a>.
      </p>

      <div class="resend-code">
        <div class="already-customer">
          <a href="#" class="js-resend-otp">Resend code</a>
        </div>
      </div>
    </div>

  </main>

  <div class="divider-3"></div>

  <footer class="signin-footer">
    <div class="footer-links">
      <a href="#">Conditions of Use</a>
      <a href="#">Privacy Notice</a>
      <a href="#">Help</a>
    </div>

    <div class="footer-copyright">
      © 1996-2026, dydx.com, Inc. or its affiliates
    </div>
  </footer>

  <script type="module" src="scripts/auth/numberVerify.js"></script>

</body>

</html>
