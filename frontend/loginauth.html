<!DOCTYPE html>
<html>

<head>
  <title>Looks like you're new</title>

  <meta name="viewport" content="width=device-width, initial-scale=0.8">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

  <!-- Shared CSS -->
  <link rel="stylesheet" href="styles/shared/general.css">
  <link rel="stylesheet" href="styles/shared/amazon-header.css">

  <!-- Signin Page CSS -->
  <link rel="stylesheet" href="styles/pages/login.css">
</head>

<body class="login-auth-page">
  <!-- Logo -->
  <div class="signin-header">
    <img src="images/amazon-logo-black.png" class="amazon-logo-dark">
  </div>

  <!-- Card -->
  <div class="auth-container">

    <div class="auth-card ">

      <h1>Looks like you're new to Amazon</h1>

      <div class="email-acc-create">
        <p class="js-user-identifier"></p>
        <a href="#" class="js-change-user">Change</a>
      </div>

      <div class="email-acc-create">
        <p>Let's create an account using
          <span class="js-identifier-type"></span>
        </p>
      </div>


      <button type="submit" class="primary-button">
        Proceed to create an account
      </button>

      <hr class="divider">

      <div class="already-customer">
        <div class="already-customer-2">Already a customer?</div>
        <a href="#" class="js-change-user"> Sign in with another email or mobile</a>
      </div>

    </div>

  </div>

  <div class="divider-2"></div>

  <footer class="signin-footer">
    <div class="footer-links">
      <a href="#">Conditions of Use</a>
      <a href="#">Privacy Notice</a>
      <a href="#">Help</a>
    </div>

    <div class="footer-copyright">
      © 1996-2026, Amazon.com, Inc. or its affiliates
    </div>
  </footer>

  <script type="module" src="scripts/auth/newUserLogin.js"></script>

</body>

</html>
