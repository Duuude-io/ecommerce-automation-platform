<!DOCTYPE html>
<html>

<head>
  <title>Sign In - dydx Project</title>

  <meta name="viewport" content="width=device-width, initial-scale=0.8">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

  <!-- Shared CSS -->
  <link rel="stylesheet" href="styles/shared/general.css">
  <link rel="stylesheet" href="styles/shared/dydx-header.css">

  <!-- Signin Page CSS -->
  <link rel="stylesheet" href="styles/pages/login.css">
</head>

<body class="login-page">
  <div class="signin-page-wrapper">

    <header class="signin-header">
      <a href="index.html">
        <img class="dydx-logo-dark" src="images/Dwde_Logo_ .gif">
      </a>
    </header>

    <main class="signin-container">

      <div class="signin-card">

        <h1>Sign in or create account</h1>

        <form class="signin-form js-login-form">

          <label>Enter mobile number or email</label>

          <input id="number-email" type="text" required>

          <button type="submit" class="primary-button">
            Continue
          </button>

        </form>

        <p class="signin-info">
          By continuing, you agree to dydx's
          <a href="#">Conditions of Use</a> and
          <a href="#">Privacy Notice</a>
        </p>

        <a class="help-link" href="#">Need help?</a>

        <div class="divider"></div>

        <div class="business-account">
          <div class="buying-for-work">Buying for work?</div>
          <a href="#">Create a free business account</a>
        </div>

      </div>

    </main>

    <div class="divider-2"></div>

    <footer class="signin-footer">
      <div class="footer-links">
        <a href="#">Conditions of Use</a>
        <a href="#">Privacy Notice</a>
        <a href="#">Help</a>
      </div>

      <div class="footer-copyright">
        © 1996-2026, dydx.com, Inc. or its affiliates
      </div>
    </footer>

  </div>

  <script type="module" src="scripts/auth/login.js"></script>

</body>

</html>
