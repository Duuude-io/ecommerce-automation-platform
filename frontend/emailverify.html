<!DOCTYPE html>
<html>

<head>
  <title>Verify email</title>

  <meta name="viewport" content="width=device-width, initial-scale=0.8">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

  <!-- Shared CSS -->
  <link rel="stylesheet" href="styles/shared/general.css">
  <link rel="stylesheet" href="styles/shared/dydx-header.css">

  <!-- Signin Page CSS -->
  <link rel="stylesheet" href="styles/pages/login.css">
</head>

<body class="email-verify-page">

  <!-- Header -->
  <header class="signin-header">
    <img src="images/DyDx_Logo_(2).gif" class="dydx-logo-dark">
  </header>

  <!-- Main -->
  <main class="auth-container">

    <div class="auth-card">

      <h2>Verify email address</h2>

      <div class="auth-verify-message">
        To verify your email, we've sent a One Time Password (OTP) to
        <strong class="js-user-identifier"></strong>
        <div class="auth-change-email">
          <a href="#" class="js-change-user">(Change)</a>
        </div>
      </div>

      <form class="create-form js-email-create-form">
        <div class="input-group">
          <label>Enter security code</label>
          <div class="create-input-wrapper">
            <input type="text" class="js-otp-input" maxlength="8">
          </div>
        </div>

        <button type="submit" class="primary-button js-otp-email-submit">
          Verify
        </button>

      </form>

      <div class="resend-code">
        <div class="already-customer">
          <a href="#" class="js-resend-otp">Resend code</a>
        </div>
      </div>
    </div>

  </main>

  <div class="divider-3"></div>

  <footer class="signin-footer">
    <div class="footer-links">
      <a href="#">Conditions of Use</a>
      <a href="#">Privacy Notice</a>
      <a href="#">Help</a>
    </div>

    <div class="footer-copyright">
      © 1996-2026, dydx.com, Inc. or its affiliates
    </div>
  </footer>

  <script type="module" src="scripts/auth/emailVerify.js"></script>

</body>

</html>
