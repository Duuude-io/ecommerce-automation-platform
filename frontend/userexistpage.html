<!DOCTYPE html>
<html>

<head>
  <title>Use exist page</title>

  <meta name="viewport" content="width=device-width, initial-scale=0.8">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

  <!-- Shared CSS -->
  <link rel="stylesheet" href="styles/shared/general.css">
  <link rel="stylesheet" href="styles/shared/amazon-header.css">

  <!-- Signin Page CSS -->
  <link rel="stylesheet" href="styles/pages/login.css">
</head>

<body class="user-exist-page">

  <!-- Header -->
  <header class="signin-header">
    <img src="images/Dwde_Logo_ .gif" class="amazon-logo-dark">
  </header>

  <!-- Main -->
  <main class="auth-container">

    <div class="auth-card">

      <h4>Welcome Back!</h4>

      <div class="otp-wrapper">
        <p class="otp-number">
          <a href="#" class="js-change-login"></a>
        </p>
      </div>

      <form class="create-form">

        <div class="enter-password">
          <div class="input-group">
            <label>Use password</label>
            <div class="create-input-wrapper">
              <input type="password">
            </div>
          </div>
        </div>

        <button type="submit" class="primary-button">
          Log In
        </button>

      </form>

      <p class="create-signin-info">
        By Secure Log In, you agree to Amazon's
        <a href="#">Conditions of Use</a> and
        <a href="#">Privacy Notice</a>.
      </p>

      <div class="skip-verification">
        <a href="#" class="js-otp-login">
          Use OTP Instead ... >>>
        </a>
      </div>

    </div>

  </main>

  <div class="divider-3"></div>

  <footer class="signin-footer">
    <div class="footer-links">
      <a href="#">Conditions of Use</a>
      <a href="#">Privacy Notice</a>
      <a href="#">Help</a>
    </div>

    <div class="footer-copyright">
      © 1996-2026, Amazon.com, Inc. or its affiliates
    </div>
  </footer>

  <script type="module" src="scripts/auth/userExistPage.js"></script>

</body>

</html>
