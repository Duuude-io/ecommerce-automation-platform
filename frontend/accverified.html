<!DOCTYPE html>
<html>

<head>
  <title>Account Verified</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

  <!-- Shared CSS -->
  <link rel="stylesheet" href="styles/shared/general.css">
  <link rel="stylesheet" href="styles/shared/amazon-header.css">

  <!-- Signin Page CSS -->
  <link rel="stylesheet" href="styles/pages/login.css">
</head>

<body class="acc-verified-page">

  <!-- Header -->
  <header class="signin-header">
    <img src="images/amazon-logo-black.png" class="amazon-logo-dark">
  </header>

  <!-- Main -->
  <main class="auth-container">
    <div class="auth-card">
      <div class="success-icon-container">

        <h4>Perfect!</h4>

        <div class="account-success-content">
          <h2>Account Fully Verified</h2>
          <p class="success-subtext">You're all set to browse and place orders securely.</p>
        </div>

        <div class="user-confirmation-box">
          <span class="js-display-email"></span>
          <span class="verified-badge">✓</span>
        </div>

        <div class="user-confirmation-box-phone">
          <span class="js-display-phone"></span>
          <span class="verified-badge">✓</span>
        </div>

        <div class="success-button">
          <button type="button" class="primary-button js-start-shopping">
            Continue Shopping
          </button>
        </div>
      </div>
    </div>
  </main>

  <div class="divider-2"></div>

  <footer class="signin-footer">
    <div class="footer-links">
      <a href="#">Conditions of Use</a>
      <a href="#">Privacy Notice</a>
      <a href="#">Help</a>
    </div>

    <div class="footer-copyright">
      © 1996-2026, Amazon.com, Inc. or its affiliates
    </div>
  </footer>

  <script type="module" src="scripts/auth/accVerified.js"></script>

</body>

</html>
