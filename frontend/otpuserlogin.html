<!DOCTYPE html>
<html>

<head>
  <title>Create account</title>

  <meta name="viewport" content="width=device-width, initial-scale=0.8">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

  <!-- Shared CSS -->
  <link rel="stylesheet" href="styles/shared/general.css">
  <link rel="stylesheet" href="styles/shared/amazon-header.css">

  <!-- Signin Page CSS -->
  <link rel="stylesheet" href="styles/pages/login.css">
</head>

<body class="otp-user-login-page">

  <!-- Header -->
  <header class="signin-header">
    <img src="images/Dwde_Logo_ .gif" class="amazon-logo-dark">
  </header>

  <!-- Main -->
  <main class="auth-container">

    <div class="auth-card">

      <div class="otp-wrapper">
        <p class="otp-number">
          <a href="#" class="js-change-login"></a>
        </p>
      </div>

      <div class="otp-login-info">
        <p class="otp-info">
          We've sent a One Time Password (OTP) to your phone number.
          Please enter it below.
        </p>
      </div>

      <form class="create-form">
        <div class="input-group">
          <label>Enter OTP</label>

          <div class="create-input-wrapper">
            <input type="password" class="otp-user-input js-otp-user-input" placeholder="-_-_-_-_-_">
          </div>
        </div>

        <button type="submit" class="primary-button js-otp-user-login-submit">
          Log In
        </button>
      </form>

      <p class="create-signin-info">
        By Secure Log In, you agree to Amazon's
        <a href="#">Conditions of Use</a> and
        <a href="#">Privacy Notice</a>.
      </p>

      <div class="resend-code">
        <div class="already-customer">
          <a href="#" class="js-resend-otp">Resend code</a>
        </div>
      </div>

    </div>

  </main>

  <div class="divider-3"></div>

  <footer class="signin-footer">
    <div class="footer-links">
      <a href="#">Conditions of Use</a>
      <a href="#">Privacy Notice</a>
      <a href="#">Help</a>
    </div>

    <div class="footer-copyright">
      © 1996-2026, Amazon.com, Inc. or its affiliates
    </div>
  </footer>

  <script type="module" src="scripts/auth/otpUserLogin.js"></script>

</body>

</html>
