<!DOCTYPE html>
<html>

<head>
  <title>Create account</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

  <!-- Shared CSS -->
  <link rel="stylesheet" href="styles/shared/general.css">
  <link rel="stylesheet" href="styles/shared/amazon-header.css">

  <!-- Signin Page CSS -->
  <link rel="stylesheet" href="styles/pages/login.css">
</head>

<body>

  <!-- Header -->
  <header class="signin-header">
    <img src="images/amazon-logo-black.png" class="amazon-logo-dark">
  </header>

  <!-- Main -->
  <main class="auth-container">

    <div class="auth-card">

      <h2>Create account</h2>

      <form class="create-form">

        <div class="input-group">
          <label>Enter mobile number or email</label>
          <div class="create-input-wrapper">
            <input type="text">
          </div>
        </div>

        <div class="input-group">
          <label>Your name</label>
          <div class="create-input-wrapper">
            <input type="text" placeholder="First and last name">
          </div>
        </div>


        <div class="input-group">
          <label>Password (at least 6 characters)</label>
          <div class="create-input-wrapper">
            <input type="password">
          </div>
          <div class="info-message">
            <span class="info-icon">!</span>
            Passwords must be at least 6 characters.
          </div>
        </div>

        <div class="input-group">
          <label>Re-enter password</label>
          <div class="create-input-wrapper">
            <input type="password">
          </div>
        </div>

        <button class="primary-button">Continue</button>

      </form>

      <div class="divider"></div>

      <div class="already-customer">
        <div class="already-customer-2">Already a customer?</div>
        <a href="#">Sign in instead</a>
        </p>

        <p class="create-signin-info">
          By creating an account, you agree to Amazon's
          <a href="#">Conditions of Use</a> and
          <a href="#">Privacy Notice</a>.
        </p>

      </div>

  </main>

  <div class="divider-2"></div>

  <footer class="signin-footer">

    <div class="footer-links">
      <a href="#">Conditions of Use</a>
      <a href="#">Privacy Notice</a>
      <a href="#">Help</a>
    </div>

    <div class="footer-copyright">
      © 1996-2026, Amazon.com, Inc. or its affiliates
    </div>

  </footer>

</body>

</html>
