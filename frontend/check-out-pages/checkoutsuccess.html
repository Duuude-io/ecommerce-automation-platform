<!DOCTYPE html>
<html>

<head>
  <title>Checkout Success</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

  <!-- Shared CSS -->
  <link rel="stylesheet" href="../styles/shared/general.css ">
  <link rel="stylesheet" href="../styles/shared/amazon-header.css">

  <!-- Signin Page CSS -->
  <link rel="stylesheet" href="../styles/pages/login.css">

  <link rel="stylesheet" href="../styles/pages/check-out-flow/checkoutflow.css ">
</head>

<body class="checkout-success-page">

  <!-- Header -->
  <header class="signin-header">
    <a href="../amazon.html">
      <img src="../images/amazon-logo-black.png" class="amazon-logo-dark">
    </a>
  </header>

  <!-- Main -->
  <main class="auth-container">

    <div class="auth-card">

      <h1> Your Order Is Placed Successfully!</h1>

      <div class="order-id">
        Order ID:
        <span class="js-order-id"></span>
      </div>

      <div class="js-receipt-link"></div>


      <div class="order-success-container">
        <img class="order-success-animation" src="../images/ordersuccessfullyplaced.gif" alt="Order Success Animaion">
        <a class="orders-button view-products-link" href="../orders.html" data-testid="view-products-link">
          View Orders
        </a>
      </div>

      <button type="button" class="primary-button">Continue Shopping</button>

      <div class="divider"></div>

    </div>
  </main>


  <div class="divider-2"></div>

  <footer class="signin-footer">

    <div class="footer-links">
      <a href="#">Conditions of Use</a>
      <a href="#">Privacy Notice</a>
      <a href="#">Help</a>
    </div>

    <div class="footer-copyright">
      © 1996-2026, Amazon.com, Inc. or its affiliates
    </div>

  </footer>

  <script type="module" src="../scripts/check-out-flow/checkoutSuccess.js"></script>

</body>

</html>
