<!DOCTYPE html>
<html>

<head>
  <title>Billing Details</title>

  <meta name="viewport" content="width=device-width, initial-scale=0.8">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

  <!-- Shared CSS -->
  <link rel="stylesheet" href="../styles/shared/general.css ">
  <link rel="stylesheet" href="../styles/shared/amazon-header.css">

  <!-- Signin Page CSS -->
  <link rel="stylesheet" href="../styles/pages/login.css">
  <link rel="stylesheet" href="../styles/pages/check-out-flow/checkoutflow.css">
</head>

<body class="bill-details-page">

  <!-- Header -->
  <header class="signin-header">
    <a href="../index.html">
      <img src="../images/amazon-logo-black.png" class="amazon-logo-dark">
    </a>
  </header>

  <!-- Main -->
  <main class="auth-container">

    <div class="auth-card">

      <h3>Saved Addresses</h3>
      <div class="js-saved-addresses"></div>

      <p></p>

      <h1>Or enter a new address below</h1>

      <form class="create-form js-billdetails-form">

        <div class="input-group">
          <div class="create-input-wrapper">

            <input type="text" class="js-full-name" placeholder="Full Name">

            <input type="text" class="js-apartment" placeholder="Apartment, suite, unit, etc">

            <input type="text" class="js-street-address" placeholder="Street Address">

            <input type="text" class="js-city" placeholder="Town/City">

            <select class="state-select js-state" id="state" required>
              <option value="" selected hidden>
                Select State
              </option>
            </select>

            <select class="country-select js-country" id="country" required>
              <option value="" selected hidden>
                Select Country
              </option>
            </select>

            <input type="text" class="js-zip" placeholder="Zip">

            <input type="text" class="js-phone" placeholder="Phone">

            <input type="text" class="js-email" placeholder="Email">

          </div>
        </div>

        <button type="submit" class="primary-button">Continue</button>

      </form>

      <div class="divider"></div>

      <p class="signin-info">
        By continuing, you agree to Amazon's
        <a href="#">Conditions of Use</a> and
        <a href="#">Privacy Notice</a>
      </p>

      <a class="help-link" href="#">Need help?</a>

    </div>

  </main>

  <div class="divider-2"></div>

  <footer class="signin-footer">

    <div class="footer-links">
      <a href="#">Conditions of Use</a>
      <a href="#">Privacy Notice</a>
      <a href="#">Help</a>
    </div>

    <div class="footer-copyright">
      © 1996-2026, Amazon.com, Inc. or its affiliates
    </div>

  </footer>

  <script type="module" src="../scripts/check-out-flow/billDetailsPage.js"></script>

</body>

</html>
