<!DOCTYPE html>
<html>

<head>
  <title>Card Details</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

  <!-- Shared CSS -->
  <link rel="stylesheet" href="../styles/shared/general.css ">
  <link rel="stylesheet" href="../styles/shared/amazon-header.css">

  <!-- Signin Page CSS -->
  <link rel="stylesheet" href="../styles/pages/login.css">
  <link rel="stylesheet" href="../styles/pages/check-out-flow/checkoutflow.css ">
</head>

<body class="card-details-page">

  <!-- Header -->
  <header class="signin-header">
    <a href="../amazon.html">
      <img src="../images/amazon-logo-black.png" class="amazon-logo-dark">
    </a>
  </header>

  <!-- Main -->
  <main class="auth-container">

    <div class="auth-card">

      <h2>Input Card Details</h2>

      <form class="create-form">

        <div class="input-group">
          <div class="create-input-wrapper">

            <input type="text" class="js-card-number" placeholder="Card Number">

            <input type="text" class="js-expiry-number" placeholder="Expiry Number">

            <input type="text" class="js-cvv-number" placeholder="CVV">

          </div>
        </div>

        <button type="submit" class="primary-button">Continue</button>

      </form>

      <div class="divider"></div>

      <p class="signin-info">
        By continuing, you agree to Amazon's
        <a href="#">Conditions of Use</a> and
        <a href="#">Privacy Notice</a>
      </p>

      <a class="help-link" href="#">Need help?</a>

    </div>

  </main>

  <div class="divider-2"></div>

  <footer class="signin-footer">

    <div class="footer-links">
      <a href="#">Conditions of Use</a>
      <a href="#">Privacy Notice</a>
      <a href="#">Help</a>
    </div>

    <div class="footer-copyright">
      © 1996-2026, Amazon.com, Inc. or its affiliates
    </div>

  </footer>

  <script type="module" src="../scripts/check-out-flow/cardDetailsPage.js"></script>

</body>

</html>
