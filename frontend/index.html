<!DOCTYPE html>
<html>

<head>
  <title>dydx Project</title>

  <!-- This code is needed for responsive design to work.
      (Responsive design = make the website look good on
      smaller screen sizes like a phone or a tablet). -->
  <meta name="viewport" content="width=device-width, initial-scale=0.6">

  <!-- Load a font called Roboto from Google Fonts. -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

  <!-- Here are the CSS files for this page. -->
  <link rel="stylesheet" href="styles/shared/general.css">
  <link rel="stylesheet" href="styles/shared/dydx-header.css">
  <link rel="stylesheet" href="styles/pages/dydx.css">
</head>

<body class="app-page">
  <div class="dydx-header">
    <div class="dydx-header-left-section">
      <a href="index.html" class="header-link">
        <img class="dydx-logo" src="images/Dwde_Logo_ .gif">
        <img class="dydx-mobile-logo" src="images/dydx-mobile-logo-white.png">
      </a>
    </div>

    <div class="dydx-header-middle-section">
      <input class="search-bar js-search-bar" type="text" placeholder="Search">

      <button class="search-button js-search-button">
        <img class="search-icon" src="images/icons/search-icon.png">
      </button>
    </div>

    <div class="dydx-header-right-section">
      <div class="account-section js-account-section"></div>
      <a class="orders-link header-link" href="orders.html">
        <span class="returns-text">Returns</span>
        <span class="orders-text">& Orders</span>
      </a>

      <a class="cart-link header-link" href="checkout.html">
        <img class="cart-icon" src="images/icons/cart-icon.png">
        <div class="cart-quantity js-cart-quantity"></div>
        <div class="cart-text">Cart</div>
      </a>
    </div>
  </div>

  <div class="main">
    <div class="products-grid js-products-grid">
    </div>
  </div>

  <script type="module" src="scripts/dydx.js"></script>

</body>

</html>
