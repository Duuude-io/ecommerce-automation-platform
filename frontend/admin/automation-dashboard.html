<!DOCTYPE html>
<html>

<head>
  <title>Automation Dashboard</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../styles/shared/general.css">
  <link rel="stylesheet" href="../styles/shared/amazon-header.css">
  <link rel="stylesheet" href="../styles/pages/amazon.css">
  <link rel="stylesheet" href="../styles/pages/admin/automation-dashboard.css">
</head>

<body>

  <h1>Automation Dashboard</h1>

  <div class="automation-button">
    <button id="refreshBtn">Refresh</button>
    <button onclick="filterLogs('all')">All</button>
    <button onclick="filterLogs('success')">Success</button>
    <button onclick="filterLogs('failed')">Failed</button>
  </div>

  <div class="automation-table">
    <table border="5">
      <thead>
        <tr>
          <th>Event</th>
          <th>Handler</th>
          <th>Status</th>
          <th>User ID</th>
          <th>Timestamp</th>
          <th>Payload</th>
        </tr>
      </thead>

      <tbody id="logsTable"></tbody>
    </table>
  </div>

  <div id="payloadPanel" class="payload-panel hidden">
    <div class="payload-header">
      <h3>Payload Viewer</h3>
      <button id="closePayload">✖</button>
    </div>

    <pre id="payloadData"></pre>
  </div>

  <script type="module" src="../scripts/admin/automation-dashboard.js"></script>

</body>

</html>
