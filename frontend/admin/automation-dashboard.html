<!DOCTYPE html>
<html>

<head>
  <title>Automation Dashboard</title>

  <meta name="viewport" content="width=device-width, initial-scale=0.72">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

  <!-- Shared CSS -->
  <link rel="stylesheet" href="../styles/shared/general.css">
  <link rel="stylesheet" href="../styles/shared/amazon-header.css">

  <!-- Dashboard CSS -->
  <link rel="stylesheet" href="../styles/pages/login.css">
  <link rel="stylesheet" href="../styles/pages/admin/automation-dashboard.css">
</head>

<body class="dashboard-page">
  <div class="signin-page-wrapper">

    <!-- HEADER -->
    <header class="signin-header">
      <a href="../amazon.html">
        <img class="amazon-logo-dark" src="../images/amazon-logo-black.png">
      </a>
    </header>

    <!-- CENTERED CONTENT -->
    <main class="signin-container">

      <div class="dashboard-header">

        <h1>Automation Dashboard</h1>

        <!-- METRICS -->
        <div class="automation-metrics">
          <div class="metric-card">
            <h3>TotalEvents♨️</h3>
            <p class="total-count" id="totalEvents">0</p>
          </div>

          <div class="metric-card">
            <h3>SuccessRate💫</h3>
            <p class="rate-count" id="successRate">0%</p>
          </div>

          <div class="metric-card failed" data-status="failed">
            <h3>FailedEvents⛔</h3>
            <p class="failed-count" id="failedEvents">0</p>
          </div>

          <div class="metric-card success" data-status="success">
            <h3>SuccessFul 🟢</h3>
            <p class="success-count" id="successEvents">0</p>
          </div>

          <div class="metric-card" data-event="order_created">
            <h3>Orders Created</h3>
            <p class="orders-count" id="orderCreated">0</p>
          </div>

          <div class="metric-card" data-event="user_created">
            <h3>Users Created</h3>
            <p class="users-count" id="userCreated">0</p>
          </div>

          <div class="metric-card" data-event="user_fully_verified">
            <h3>Users Verified</h3>
            <p class="verified-count" id="userVerified">0</p>
          </div>

          <div class="metric-card" data-event="order_cancelled">
            <h3>OrdersCancelled</h3>
            <p class="cancelled-count" id="orderCancelled">0</p>
          </div>

          <div class="metric-card" data-event="user_logged_in">
            <h3>UserLoggedIn</h3>
            <p class="loggedin-count" id="userLoggedIn">0</p>
          </div>

          <div class="metric-card" data-view="view_all_logs">
            <h3>View All Logs</h3>
            <p class="logs-count" id="viewAllLogs">0</p>
          </div>

        </div>

      </div>

    </main>

    <!-- FOOTER -->
    <div class="divider-2"></div>

    <footer class="signin-footer">
      <div class="footer-links">
        <a href="#">Conditions of Use</a>
        <a href="#">Privacy Notice</a>
        <a href="#">Help</a>
      </div>

      <div class="footer-copyright">
        © 1996-2026, Amazon.com, Inc. or its affiliates
      </div>
    </footer>

  </div>

  <script type="module" src="../scripts/admin/automation-dashboard.js"></script>

</body>

</html>
