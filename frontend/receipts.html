<!DOCTYPE html>
<html>

<head>
  <title>Receipts Page</title>

  <meta name="viewport" content="width=device-width, initial-scale=0.8">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

  <!-- Shared CSS -->
  <link rel="stylesheet" href="styles/shared/general.css ">
  <link rel="stylesheet" href="styles/shared/amazon-header.css">

  <!-- Signin Page CSS -->
  <link rel="stylesheet" href="styles/pages/login.css">
  <link rel="stylesheet" href="styles/pages/check-out-flow/checkoutflow.css ">
</head>

<body class="receipts-page">

  <!-- Header -->
  <header class="signin-header">
    <a href="index.html">
      <img src="images/amazon-logo-black.png" class="amazon-logo-dark">
    </a>
  </header>

  <!-- Main -->
  <main class="receipts-page-auth-container">

    <div class="receipts-page-auth-card">
      <div class="receipt-header">
        <h5>amazon</h5>
        <h6>Order Confirmation</h6>
        <p>Thank you for your order</p>
      </div>

      <div class="divider-4"></div>

      <div id="receiptContent" class="receipt-content">
        Loading receipt...
      </div>

    </div>

  </main>

  <div class="divider-2"></div>

  <footer class="signin-footer">

    <div class="footer-links">
      <a href="#">Conditions of Use</a>
      <a href="#">Privacy Notice</a>
      <a href="#">Help</a>
    </div>

    <div class="footer-copyright">
      © 1996-2026, Amazon.com, Inc. or its affiliates
    </div>

  </footer>

  <script type="module" src="scripts/checkout/receipts.js"></script>

</body>

</html>
